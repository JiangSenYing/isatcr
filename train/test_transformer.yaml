# GNN-DDQN with a conditional diffusion action prior.
# Run:
#   python PRC_GNN.py --config train/train_GNN_DQN_diffusion.yaml

general:
  random_seed: 42
  phase: 'train'
  begin_time: '2023-10-01 00:00:00'
  time_stride: 1
  rounds: 1
  skip_time: [60, 0]
  duration: 1500
  epsilon: 0.9
  min_epsilon: 0.02
  epsilon_decay: 0.98 #0.98
  print_cycle: 10
  select_mode: 3
  reward_factors: [1, 0.05, 1, 0.1, 0.25] # reach, delay（0.05）, loss, memory_threshold, memory_factor

agent:
  mode: 'GNN_DQN'
  obs_type: 'graph'
  controller_type: 'graph'
  state_dim: 33
  agent_feats: 9
  nbr_feats: 4
  nbr_feats_relational: 12
  edge_feats: 3
  n_actions: 5
  max_nbrs: 4
  hidden_size: 64
  n_hops: 2
  graph_enc_type: 'gn'
  n_heads: 4
  graph_gat_dropout: 0
  use_rnn: false
  dueling: false
  buffer_size: 500000
  batch_size: 1024
  gamma: 0.99 #0.99
  learning_rate: 0.0001
  target_update_freq: 100
  repeat: 5

  use_diffusion: false
  diffusion_steps: 10
  diffusion_hidden_size: 128
  diffusion_loss_weight: 0.01
  diffusion_q_loss_weight: 0.05
  diffusion_q_temperature: 1.0
  diffusion_guidance_weight: 0.02
  diffusion_guidance_warmup_updates: 3000
  diffusion_deterministic: true
  diffusion_normalize_prior: true
  diffusion_prior_clip: 2.0

  model_path: 'model_weights/gnn_ddqn_diffusion_improved.pth'

environment:
  mission_possibility: [0.5, 0.5]
  poisson_rate: 30
  packet_frequency: 0.6
  computing_demand_factor: [150, 250]
  computing_demand_factor_2: [300, 500]
  size_after_computing_factor: [0.08, 0.125]
  size_after_computing_1: 40000.0
  packet_size_range: [200000000.0, 600000000.0]
  tle_filepath: 
    - "./Satellite_Data/60Degree_500_72x22_tles.txt"
    - "./Satellite_Data/60Degree_10000_10x10_tles.txt"
  training_data_dir: './training_process_data/only_select_domain'
  SOD_file_path: './Ground_Data/11_ground_stations.txt'
  elevation_angle: 45
  pole: false
  memory: 12000000000.0
  computing_ability: 50000000000.0
  transmission_rate: 1200000000.0
  downlink_rate: 3000000000.0
  downstream_delays: 0.0016667
  mean_interval_time: 300
  state_update_period: 0.2
  meo_state_update_period: 0.4
  del_cycle: 10
  random_edges_del: 100
  random_nodes_del: 0
  update_cycle: 10
  n_hops: 2
  visualize: false
  print_info: false
  show_detail: false
  save_log: false
  controlDomainNumber: 4
  MinimuElevationAngle: 25
  domainPartitionMethod: RectangularDivision  # 可选: Eunomia, RectangularDivision
  rectangular_m: 10
  rectangular_n: 10
  ShowLink: false 
  # save_training_data: 'withoutTransformer_fre0.5_duration3000.txt'
  # save_training_data: 'leo72x22_meo10x10_withoutTransformer_fre0.8.txt'
  save_training_data: 'leo72x22_meo10x10True_withoutTransformer_fre0.8_test.txt'
  business_record_enabled: false
  business_record_path: './business_record_data/business_traffic_records.txt'
  business_record_reset: true

transformer:
  enabled: false
  meo_exit_enabled: true
  use_meo_aggregation: true
  meo_agent:
    hidden_dim: 64
    buffer_size: 100000
    batch_size: 64
    gamma: 0.97
    lr: 1e-4
    epsilon: 0.9
    min_epsilon: 0.01
    epsilon_decay: 0.98
    target_update_freq: 10
    update_every: 1
    max_domain_hops: 100
    reward:
      success_reward: 1.5 #1.5
      failure_penalty: 1.5 #1.2
      unfinished_penalty: 0.0
      score_penalty: 0.0
      domain_hop_penalty: 0.02
      path_hop_penalty: 0.0
      boundary_load_penalty: 0.2
      boundary_delay_penalty: 0.08 #0.05
      terminal_reward_weight: 0.2 #0.1
      progress_reward_weight: 0.2
      terminal_credit_weight: 0.2
      compute_penalty: 0.2 #0.3
      memory_penalty: 0.5 #0.5
      segment_success_reward: 1.0 #0.8
    model_path: 'model_weights/meo_domain_agent.pth'
    leo_policy:
      enabled: false
      model_path: model_weights/leo_attention_policy_v2.pt
      save_path: model_weights/leo_attention_policy_v2.pt
      train_enabled: false
      lr: 1e-4
      batch_size: 32
      buffer_size: 50000
      update_every: 1
      updates_per_step: 1
      loss_weight: 1.0
      selection_enabled: false
      loss_gate_enabled: false
      loss_gate_window_size: 20
      loss_gate_threshold: 0.1
      unreachable_penalty: 2.0
      hop_penalty: 0.0
      delay_penalty: 0.1
      compute_penalty: 0.0
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
      max_steps: 16
  history_len: 8
  forecast_horizon: 1
  batch_size: 20
  learning_rate: 1e-3
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 64
  dropout: 0.05
  max_snapshots: 20000
  warmup_snapshots: 10
  update_every: 1
  updates_per_step: 1
  eval_every: 60
  plan_every: 60
  plan_top_k: 60
  plan_delay_top_k: 30
  plan_load_top_k: 30
  repeat: 3
  plan_max_candidate_expansions: 2000
  plan_max_candidate_queue_size: 5000
  plan_max_hops: 30
  showPathError: False
  plan_delay_top_k: 8
  plan_load_top_k: 8
  plan_max_candidate_expansions: 200000
  plan_max_candidate_queue_size: 500000
  plan_packet_size: 600000000.0
  plan_computing_demand: 250000000000.0
  plan_need_compute: True
  plan_source: None
  plan_destination: None
  model_path: 'model_weights/transformer_forcase1.pth'
