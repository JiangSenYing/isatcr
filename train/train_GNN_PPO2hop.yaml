# GNN-based PPO Training Configuration
# 使用图神经网络 + PPO 算法进行卫星路由与计算决策

general:
  random_seed: 42
  phase: 'train'  # 'train' or 'test'
  begin_time: '2023-10-01 00:00:00'
  time_stride: 1
  rounds: 1
  skip_time: [60, 0]  # 60分钟跳过
  duration: 6000  # 每轮持续时间（秒）
  epsilon: 0.9              # 初始探索率
  min_epsilon: 0.02         # 最小探索率
  epsilon_decay: 0.999      # 探索率衰减
  print_cycle: 10
  select_mode: 1
  reward_factors: [1, 0.05, 1, 0.1, 0.25]  # reach, delay, loss, memory_threshold, memory_factor

agent:
  # 模式：使用 GNN_PPO 启用 GNN + PPO
  mode: 'GNN_PPO'
  
  # 状态维度配置（GNN模式：4邻居 × 6维，无需人工多跳聚合）
  neighbors_dim: 24      # 4 neighbors * 6 features
  edges_dim: 0           # GNN模式不需要
  distance_dim: 0        # GNN模式不需要
  mission_dim: 4         # [type, size, computing_demand, size_after_computing]
  current_dim: 3         # [is_producing, memory_remain, computing_remain]
  action_dim: 5          # 4 neighbors + 1 local compute
  
  # 网络结构
  hidden_dim: 256
  hidden_layers: 2
  activation: 'LeakyRelu'
  dueling: false         # PPO 不使用 dueling
  
  # GNN 特定参数
  use_gnn: true          # 是否使用 GNN
  n_hops: 2              # GNN 消息传递跳数（1 或 2）
  gnn_type: 'gcn'        # GNN 类型：'gat', 'gcn', 'sage'
  gnn_embed_dim: 64      # GNN 嵌入维度
  per_neighbor_dim: 6    # 每个邻居的特征维度
  
  # PPO 特定参数
  eps_clip: 0.1          # PPO 裁剪系数
  max_grad_norm: 0.5     # 梯度裁剪（PPO 通常用较小值）
  actor_lr: 0.0001       # Actor 学习率
  critic_lr: 0.0001      # Critic 学习率
  
  # 训练参数
  buffer_length: 100000  # PPO 通常用较小的 buffer
  batch_size: 512        # PPO 通常用较小的 batch
  gamma: 0.99
  learning_rate: 0.0001
  repeat: 4              # 每次 update 重复训练次数（PPO 通常多次更新）
  update_cycle: 30       # 更新周期
  q_mask: -1             # Q值掩码
  shuffle: true         # 是否打乱邻居顺序
  
  # 模型保存路径（PPO 保存为目录，包含 actor.pth 和 critic.pth）
  model_path: 'model_weights/gnn_ppo_modelp2'

environment:
  # 任务生成参数
  mission_possibility: [0.5, 0.5]
  poisson_rate: 30
  packet_frequency: 0.5
  computing_demand_factor: [150, 250]
  computing_demand_factor_2: [300, 500]
  size_after_computing_factor: [0.08, 0.125]
  size_after_computing_1: 40000.0  # 40e3
  packet_size_range: [200000000.0, 600000000.0]  # [200e6, 600e6]
  
  # 网络拓扑参数
  tle_filepath: './Satellite_Data/60Degree_500_12x24_tles.txt'
  SOD_file_path: './Ground_Data/11_ground_stations.txt'
  elevation_angle: 45
  pole: false
  
  # 卫星参数
  memory: 12000000000.0           # 12e9
  computing_ability: 50000000000.0  # 50e9
  transmission_rate: 1200000000.0   # 1.2e9
  downlink_rate: 3000000000.0       # 3e9
  downstream_delays: 0.0016667
  mean_interval_time: 30
  state_update_period: 0.1
  
  # 动态拓扑参数
  del_cycle: 30
  random_edges_del: 15
  random_nodes_del: 0
  update_cycle: 10
  
  # 日志与可视化
  visualize: false
  print_info: false
  show_detail: false
  save_log: false
  save_training_data: 'train_GNN_PPOp2.txt'
